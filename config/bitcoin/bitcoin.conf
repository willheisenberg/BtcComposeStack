# Run in the foreground (important for Docker so the container stays alive).
daemon=0

# Allow incoming P2P connections from other Bitcoin nodes.
listen=1

# Restrict all peer connections to Tor (.onion) only.
onlynet=onion

# Allow inbound onion connections via Tor hidden service.
listenonion=1

# Use modern RPC serialization format (0 = currently recommended).
rpcserialversion=0

# Size of the UTXO/block index cache in MB (higher = less disk I/O, more RAM).
dbcache=512

# Maximum mempool size in MB before older/low-fee transactions are evicted.
maxmempool=300

# Route outbound network connections through the Tor SOCKS proxy.
proxy=tor:9050
